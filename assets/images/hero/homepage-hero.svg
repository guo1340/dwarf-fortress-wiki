<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Dwarf Fortress tile-map mountainhome with halls, workshops, magma and carved records">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10100f"/>
      <stop offset=".45" stop-color="#26231d"/>
      <stop offset="1" stop-color="#090909"/>
    </linearGradient>
    <linearGradient id="magma" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7f2621"/>
      <stop offset=".44" stop-color="#df6b36"/>
      <stop offset=".72" stop-color="#ffb24f"/>
      <stop offset="1" stop-color="#d5b36f"/>
    </linearGradient>
    <pattern id="tilegrid" width="42" height="42" patternUnits="userSpaceOnUse">
      <rect width="42" height="42" fill="none" stroke="#b7c0c4" stroke-opacity=".12" stroke-width="2"/>
      <rect x="2" y="2" width="8" height="8" fill="#d5b36f" opacity=".12"/>
    </pattern>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .2"/></feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#tilegrid)" opacity=".7"/>
  <circle cx="1240" cy="132" r="78" fill="#d5b36f" opacity=".25"/>

  <path d="M0 520 250 245l158 128 182-252 220 330 150-160 170 180 180-260 290 330v359H0z" fill="#24231f"/>
  <path d="M0 620 310 350l130 90 150-190 210 280 120-108 150 160 210-270 320 300v288H0z" fill="#141412"/>
  <path d="M0 770c240-60 430-58 680-20 320 48 600 28 920-54v204H0z" fill="#080807"/>

