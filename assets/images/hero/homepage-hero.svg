    <rect x="330" y="420" width="120" height="104" fill="#24231f" stroke="#514638" stroke-width="6"/>
    <g fill="#d5b36f">
      <rect x="78" y="184" width="34" height="34"/>
      <rect x="224" y="184" width="34" height="34"/>
      <rect x="370" y="184" width="34" height="34"/>
      <rect x="224" y="326" width="34" height="34"/>
      <rect x="78" y="448" width="34" height="34"/>
      <rect x="370" y="448" width="34" height="34"/>
    </g>
    <path d="M246 122v434M42 344h408" stroke="#8d7041" stroke-width="8" opacity=".8"/>
